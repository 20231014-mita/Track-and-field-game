<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>REAL TRACK CHAMPIONSHIP - 陸上競技リアルキャリア</title>
<style>
:root{
  --bg:#071015;--panel:rgba(8,17,25,.82);--panel2:rgba(255,255,255,.075);--line:rgba(255,255,255,.16);
  --text:#f5fbff;--muted:#93a8b6;--gold:#ffd35a;--red:#ff4b4b;--green:#47ff9a;--cyan:#45d7ff;--blue:#4d7dff;
  --shadow:0 22px 70px rgba(0,0,0,.48);--radius:24px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at 50% 0%,#1d4a52 0%,#09141b 46%,#030608 100%);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif}
body:before{content:"";position:fixed;inset:0;background:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:42px 42px;mask-image:radial-gradient(circle at 50% 20%,black,transparent 78%);pointer-events:none}
#app{position:fixed;inset:0;display:grid;grid-template-rows:auto 1fr auto;gap:10px;padding:env(safe-area-inset-top) 12px env(safe-area-inset-bottom) 12px}
header{height:74px;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.045));backdrop-filter:blur(14px);border-radius:0 0 22px 22px;box-shadow:var(--shadow)}
.brand{display:flex;align-items:center;gap:12px;min-width:0}.logo{width:48px;height:48px;border-radius:16px;background:conic-gradient(from 220deg,var(--gold),#fff,var(--cyan),var(--blue),var(--gold));display:grid;place-items:center;box-shadow:0 0 28px rgba(69,215,255,.25)}.logo:after{content:"RT";font-weight:1000;color:#071015;letter-spacing:-2px}.title{line-height:1.05;min-width:0}.title h1{font-size:18px;margin:0;font-weight:1000;letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.title div{font-size:12px;color:var(--muted);font-weight:700}.topStats{display:flex;gap:8px;align-items:center;justify-content:flex-end;min-width:0;flex-wrap:wrap}.pill{border:1px solid var(--line);background:rgba(0,0,0,.24);border-radius:999px;padding:7px 10px;font-size:12px;color:#d9f6ff;font-weight:900;white-space:nowrap}.pill b{color:var(--gold)}
main{position:relative;min-height:0;display:grid;grid-template-columns:310px 1fr 330px;gap:10px}.panel{border:1px solid var(--line);background:var(--panel);backdrop-filter:blur(18px);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.left,.right{display:flex;flex-direction:column;min-height:0}.panelHead{padding:14px 14px 10px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:8px}.panelHead h2{font-size:15px;margin:0;font-weight:1000;letter-spacing:.04em}.scroll{overflow:auto;padding:12px;min-height:0}.stage{position:relative;border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);background:#05090d;box-shadow:var(--shadow)}canvas{width:100%;height:100%;display:block}.overlayTop{position:absolute;inset:12px 12px auto 12px;display:flex;justify-content:space-between;gap:10px;pointer-events:none}.scoreboard{pointer-events:none;min-width:min(550px,100%);border:1px solid rgba(255,255,255,.2);background:linear-gradient(180deg,rgba(0,0,0,.66),rgba(0,0,0,.32));backdrop-filter:blur(10px);border-radius:18px;padding:10px 12px;box-shadow:0 12px 38px rgba(0,0,0,.35)}.scoreboard .row{display:flex;justify-content:space-between;gap:12px;align-items:center}.scoreboard .big{font-size:26px;font-weight:1000;letter-spacing:.03em}.scoreboard .small{font-size:12px;color:#b9ced9;font-weight:800}.meters{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.bar{height:10px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden;border:1px solid rgba(255,255,255,.11)}.bar i{display:block;height:100%;width:0%;background:linear-gradient(90deg,var(--cyan),var(--green),var(--gold));border-radius:999px}.centerMsg{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;text-shadow:0 8px 20px rgba(0,0,0,.75)}.centerMsg .huge{font-size:clamp(42px,8vw,104px);font-weight:1000;letter-spacing:.08em;line-height:.9}.centerMsg .sub{font-size:16px;font-weight:900;color:#e9fbff;margin-top:12px}.flash{position:absolute;inset:0;pointer-events:none;background:rgba(255,255,255,0);transition:background .16s}.photoLine{position:absolute;top:0;bottom:0;width:2px;background:#fff;box-shadow:0 0 16px #fff;opacity:.0;pointer-events:none}
.menuGrid{display:grid;grid-template-columns:1fr;gap:9px}.btn{border:1px solid rgba(255,255,255,.18);background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.055));color:var(--text);border-radius:16px;padding:12px 12px;font-weight:1000;font-size:13px;letter-spacing:.02em;cursor:pointer;box-shadow:0 8px 22px rgba(0,0,0,.18);transition:.12s transform,.12s background}.btn:active{transform:scale(.97)}.btn.primary{background:linear-gradient(180deg,#ffe58a,#ffb743);color:#111;border-color:#fff1a8}.btn.green{background:linear-gradient(180deg,#77ffb6,#15c875);color:#04140b}.btn.red{background:linear-gradient(180deg,#ff8a8a,#e42f46);color:#fff}.btn.blue{background:linear-gradient(180deg,#7ed9ff,#346dff);color:#fff}.btn.ghost{background:rgba(255,255,255,.055)}.btn:disabled{opacity:.38;filter:grayscale(.65);cursor:not-allowed}.eventCard{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.035));border-radius:18px;padding:12px;margin-bottom:9px;cursor:pointer}.eventCard.active{border-color:var(--gold);box-shadow:0 0 0 1px rgba(255,211,90,.35) inset;background:linear-gradient(180deg,rgba(255,211,90,.15),rgba(255,255,255,.04))}.eventCard h3{margin:0 0 4px;font-size:14px}.eventCard p{margin:0;color:var(--muted);font-size:12px;line-height:1.45}.stat{margin:9px 0}.stat .lab{display:flex;justify-content:space-between;font-size:12px;color:#c6dae7;font-weight:850;margin-bottom:5px}.stat .lab b{color:var(--gold)}.miniList{display:grid;gap:7px}.miniRow{display:flex;justify-content:space-between;gap:8px;padding:9px;border-radius:13px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.08);font-size:12px}.miniRow b{color:#fff}.miniRow span{color:#b5c8d2}.input{width:100%;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.25);color:white;border-radius:14px;padding:12px;font-weight:900;outline:none}.kitGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0}.kit{height:38px;border-radius:12px;border:2px solid rgba(255,255,255,.2);cursor:pointer}.kit.active{border-color:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.22)}
.controls{height:112px;display:flex;align-items:stretch;gap:10px}.controlPanel{flex:1;border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.1),rgba(255,255,255,.045));border-radius:22px;box-shadow:var(--shadow);display:grid;grid-template-columns:1fr 1fr 160px;gap:10px;padding:10px}.tapBtn{border:none;border-radius:21px;font-weight:1000;font-size:18px;letter-spacing:.06em;color:#071015;box-shadow:0 12px 30px rgba(0,0,0,.3),inset 0 2px 0 rgba(255,255,255,.45);cursor:pointer}.tapBtn.run{background:linear-gradient(180deg,#fdfdff,#8ee9ff)}.tapBtn.action{background:linear-gradient(180deg,#fff1a4,#ffb525)}.tapBtn.danger{background:linear-gradient(180deg,#ffb4b4,#ff4059);color:#fff}.tapBtn.hidden{display:none}.micro{border:1px solid var(--line);background:rgba(0,0,0,.28);border-radius:18px;padding:9px;display:grid;gap:6px;align-content:center}.micro div{font-size:11px;color:var(--muted);font-weight:900}.micro b{font-size:18px;color:#fff}.timingRail{position:relative;height:12px;border:1px solid rgba(255,255,255,.18);border-radius:999px;background:linear-gradient(90deg,#ff4b4b 0 18%,#ffd35a 18% 38%,#47ff9a 38% 62%,#ffd35a 62% 82%,#ff4b4b 82%);overflow:hidden}.timingNeedle{position:absolute;top:-4px;width:4px;height:20px;border-radius:5px;background:#fff;box-shadow:0 0 12px #fff;left:50%}.toast{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);padding:10px 14px;border-radius:999px;background:rgba(0,0,0,.68);border:1px solid rgba(255,255,255,.2);font-weight:1000;opacity:0;transition:.2s;pointer-events:none}.toast.show{opacity:1;bottom:30px}.modal{position:absolute;inset:0;display:none;place-items:center;background:rgba(0,0,0,.54);backdrop-filter:blur(8px);z-index:10;padding:18px}.modal.show{display:grid}.modalBox{width:min(720px,96vw);max-height:90vh;overflow:auto;border:1px solid rgba(255,255,255,.18);background:linear-gradient(180deg,rgba(12,25,35,.96),rgba(5,10,15,.96));border-radius:28px;box-shadow:0 30px 100px rgba(0,0,0,.55);padding:18px}.modalBox h2{margin:0 0 8px;font-size:24px}.resultsTable{width:100%;border-collapse:collapse;font-size:13px;overflow:hidden;border-radius:16px}.resultsTable th,.resultsTable td{padding:9px;border-bottom:1px solid rgba(255,255,255,.08);text-align:left}.resultsTable th{color:#a8c0cf}.goldText{color:var(--gold)}.bad{color:var(--red)}.good{color:var(--green)}.saveBox{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;word-break:break-all;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.16);border-radius:14px;padding:10px;color:#d5f6ff}.hidden{display:none!important}
@media(max-width:1050px){main{grid-template-columns:1fr}.left,.right{position:absolute;z-index:5;width:min(360px,92vw);top:84px;bottom:126px;transform:translateX(-110%);transition:.2s}.right{right:12px;transform:translateX(110%)}.left.open{transform:translateX(0)}.right.open{transform:translateX(0)}.stage{min-height:0}.controlPanel{grid-template-columns:1fr 1fr 120px}.topStats .hideSmall{display:none}.title h1{font-size:15px}.controls{height:104px}}@media(max-width:620px){#app{padding-left:8px;padding-right:8px;gap:8px}header{height:66px;padding:8px}.logo{width:42px;height:42px}.pill{font-size:10px;padding:6px 7px}.controlPanel{grid-template-columns:1fr 1fr;grid-template-rows:1fr 34px}.micro{grid-column:1/3;display:grid;grid-template-columns:1fr 1fr}.micro .timingRail{grid-column:1/3}.tapBtn{font-size:15px}.scoreboard .big{font-size:20px}.meters{grid-template-columns:1fr}.left,.right{top:74px;bottom:118px}.centerMsg .huge{font-size:48px}}
</style>
</head>
<body>
<div id="app">
<header>
  <div class="brand"><div class="logo"></div><div class="title"><h1>REAL TRACK CHAMPIONSHIP</h1><div>リアル陸上キャリア / Timing & Physics</div></div></div>
  <div class="topStats">
    <button class="btn ghost" id="toggleLeft">MENU</button><button class="btn ghost" id="toggleRight">DATA</button>
    <div class="pill hideSmall">大会 <b id="meetName">地区大会</b></div><div class="pill">TP <b id="tp">0</b></div><div class="pill">RANK <b id="rank">Rookie</b></div>
  </div>
</header>
<main>
  <aside class="panel left" id="leftPanel"><div class="panelHead"><h2>メニュー</h2><span class="pill" id="modePill">HOME</span></div><div class="scroll" id="leftContent"></div></aside>
  <section class="stage" id="stage">
    <canvas id="game"></canvas>
    <div class="overlayTop"><div class="scoreboard"><div class="row"><div><div class="small" id="eventLabel">競技を選択</div><div class="big" id="mainReadout">READY</div></div><div style="text-align:right"><div class="small" id="windReadout">Wind +0.0</div><div class="big" id="distReadout">0.00</div></div></div><div class="meters"><div><div class="small">SPEED / POWER</div><div class="bar"><i id="speedBar"></i></div></div><div><div class="small">STAMINA / FORM</div><div class="bar"><i id="staminaBar"></i></div></div></div></div></div>
    <div class="centerMsg" id="centerMsg"><div class="huge">REAL TRACK</div><div class="sub">左のメニューから選手作成 → 大会へ</div></div>
    <div class="flash" id="flash"></div><div class="photoLine" id="photoLine"></div><div class="toast" id="toast">PERFECT</div>
    <div class="modal" id="modal"><div class="modalBox" id="modalBox"></div></div>
  </section>
  <aside class="panel right" id="rightPanel"><div class="panelHead"><h2>選手データ</h2><button class="btn ghost" id="saveBtn">保存</button></div><div class="scroll" id="rightContent"></div></aside>
</main>
<footer class="controls">
  <div class="controlPanel">
    <button class="tapBtn run hidden" id="runBtn">RUN TAP</button>
    <button class="tapBtn action hidden" id="actionBtn">ACTION</button>
    <div class="micro"><div>判定 <b id="judgeText">---</b></div><div>入力 <b id="inputText">待機</b></div><div class="timingRail"><i class="timingNeedle" id="needle"></i></div></div>
  </div>
</footer>
</div>
<script>
(()=>{
'use strict';
const $=id=>document.getElementById(id);
const canvas=$('game'),ctx=canvas.getContext('2d');
const SAVE_KEY='real_track_championship_v3_full';
const meets=[{name:'地区大会',level:0,qual:3,bonus:60},{name:'都大会',level:1,qual:3,bonus:110},{name:'全国大会',level:2,qual:1,bonus:190}];
const kits=[['#1dd3ff','#06151c'],['#ff4747','#260508'],['#ffe45c','#1d1600'],['#7dff85','#061a08'],['#ffffff','#0b0f14'],['#c77dff','#17051f'],['#ff9a3d','#1a0b00'],['#42a5ff','#050c20']];
const events={
  '100m':{name:'100m',type:'sprint',distance:100,lanes:true,desc:'反応・加速・最高速度の勝負。'},
  '200m':{name:'200m',type:'sprint',distance:200,lanes:true,curve:true,desc:'カーブ後のスピード維持が重要。'},
  '400m':{name:'400m',type:'sprint',distance:400,lanes:true,curve:true,long:true,desc:'前半を飛ばしすぎると後半失速。'},
  '110H':{name:'110mH',type:'hurdles',distance:110,lanes:true,desc:'13.72mから1台目、以後9.14m間隔のハードル。'},
  'LJ':{name:'走幅跳',type:'longjump',desc:'助走速度・踏切板・空中姿勢・着地。'},
  'HJ':{name:'走高跳',type:'highjump',desc:'助走リズムと踏切位置でバーを越える。'},
  'TJ':{name:'三段跳',type:'triplejump',desc:'ホップ・ステップ・ジャンプの3回踏切。'},
  '4x100R':{name:'4×100mリレー',type:'relay',distance:400,lanes:true,desc:'バトンゾーンでACTION。'},
  'SP':{name:'砲丸投げ',type:'throw',implement:'shot',desc:'パワー・角度・リリースのタイミング。'},
  'JT':{name:'やり投げ',type:'throw',implement:'javelin',desc:'助走速度・角度・リリースのキレ。'}
};
let state,view='home',selected='100m',game=null,last=performance.now(),toastTimer=0;
function defaultState(){return{athlete:{name:'KOJIRO',kit:0},meet:0,tp:220,created:false,stats:{reaction:45,accel:45,maxspeed:45,stamina:45,jump:45,hurdle:45,takeoff:45,strength:45,technique:45},pbs:{},missions:{},careerWins:0,history:[]};}
function load(){try{state=JSON.parse(localStorage.getItem(SAVE_KEY))||defaultState()}catch(e){state=defaultState()}fixState();}
function fixState(){state.stats=Object.assign(defaultState().stats,state.stats||{});state.pbs=state.pbs||{};state.missions=state.missions||{};state.history=state.history||[];state.tp=Number.isFinite(state.tp)?state.tp:0;state.meet=state.meet||0;state.athlete=Object.assign(defaultState().athlete,state.athlete||{});}
function save(){localStorage.setItem(SAVE_KEY,JSON.stringify(state));renderAll();showToast('保存しました','good');}
function exportCode(){return btoa(unescape(encodeURIComponent(JSON.stringify(state))));}
function importCode(code){try{const d=JSON.parse(decodeURIComponent(escape(atob(code.trim()))));state=d;fixState();save();showModal('読み込み完了','セーブコードを読み込みました。','OK');}catch(e){showToast('コードが正しくありません','bad')}}
function rank(){const s=Object.values(state.stats).reduce((a,b)=>a+b,0)/9;return s>86?'Olympian':s>76?'National':s>64?'Elite':s>54?'Varsity':'Rookie'}
function resize(){const r=canvas.parentElement.getBoundingClientRect();const d=Math.min(2,window.devicePixelRatio||1);canvas.width=Math.floor(r.width*d);canvas.height=Math.floor(r.height*d);ctx.setTransform(d,0,0,d,0,0);}
window.addEventListener('resize',resize);resize();
function renderAll(){
 $('meetName').textContent=meets[state.meet]?.name||'全国大会';$('tp').textContent=Math.round(state.tp);$('rank').textContent=rank();$('modePill').textContent=view.toUpperCase();
 renderLeft();renderRight();renderControls();
}
function renderLeft(){let html='';
 if(view==='home'){
  html+=`<div class="menuGrid"><button class="btn primary" onclick="RT.go('create')">選手作成 / 編集</button><button class="btn green" onclick="RT.go('meet')">大会に出場</button><button class="btn blue" onclick="RT.go('train')">練習・育成</button><button class="btn" onclick="RT.go('records')">記録・実績</button><button class="btn ghost" onclick="RT.go('save')">セーブコード</button></div>`;
  html+=`<div style="height:12px"></div><div class="miniList"><div class="miniRow"><b>キャリア</b><span>${meets[state.meet]?.name||'全国大会'}</span></div><div class="miniRow"><b>選手</b><span>${escapeHtml(state.athlete.name)}</span></div><div class="miniRow"><b>方針</b><span>本物の競技に近い判定</span></div></div>`;
 }else if(view==='create'){
  html+=`<label style="font-size:12px;color:#aac2cf;font-weight:900">選手名</label><input id="nameInput" class="input" value="${escapeAttr(state.athlete.name)}" maxlength="12" />`;
  html+=`<div style="font-size:12px;color:#aac2cf;font-weight:900;margin-top:12px">ユニフォーム</div><div class="kitGrid">${kits.map((k,i)=>`<div class="kit ${state.athlete.kit===i?'active':''}" onclick="RT.setKit(${i})" style="background:linear-gradient(135deg,${k[0]} 0 50%,${k[1]} 50%)"></div>`).join('')}</div>`;
  html+=`<button class="btn primary" onclick="RT.setName()">決定して保存</button><button class="btn ghost" onclick="RT.go('home')">戻る</button>`;
 }else if(view==='train'){
  html+=`<div class="miniRow"><b>TP</b><span>${Math.round(state.tp)} pt</span></div><div style="height:8px"></div>`;
  const names={reaction:'スタート反応',accel:'加速力',maxspeed:'最高速度',stamina:'スタミナ',jump:'ジャンプ力',hurdle:'ハードル技術',takeoff:'踏切精度',strength:'筋力',technique:'投てき技術'};
  for(const [k,n] of Object.entries(names)){const cost=upgradeCost(k);html+=`<button class="btn" ${state.tp<cost||state.stats[k]>=99?'disabled':''} onclick="RT.up('${k}')">${n} +1　Lv.${state.stats[k]}　必要 ${cost}TP</button>`}
  html+=`<button class="btn ghost" onclick="RT.go('home')">戻る</button>`;
 }else if(view==='meet'){
  html+=`<div class="miniRow"><b>大会</b><span>${meets[state.meet].name}</span></div><div class="miniRow"><b>進出条件</b><span>${meets[state.meet].qual}位以内</span></div><div style="height:10px"></div>`;
  for(const [id,e] of Object.entries(events)){html+=`<div class="eventCard ${selected===id?'active':''}" onclick="RT.select('${id}')"><h3>${e.name}</h3><p>${e.desc}</p></div>`}
  html+=`<button class="btn primary" onclick="RT.startSelected()">この種目で出場</button><button class="btn ghost" onclick="RT.go('home')">戻る</button>`;
 }else if(view==='records'){
  html+=`<h3 style="margin:0 0 8px">自己ベスト</h3><div class="miniList">`;
  for(const [id,e] of Object.entries(events)){html+=`<div class="miniRow"><b>${e.name}</b><span>${formatPB(id,state.pbs[id])}</span></div>`}
  html+=`</div><h3>実績</h3><div class="miniList">${missionRows()}</div><button class="btn ghost" onclick="RT.go('home')">戻る</button>`;
 }else if(view==='save'){
  html+=`<button class="btn primary" onclick="RT.copySave()">セーブコードをコピー</button><div class="saveBox" id="saveCode">${exportCode()}</div><div style="height:8px"></div><textarea id="loadCode" class="input" style="height:90px" placeholder="ここにセーブコードを貼る"></textarea><button class="btn blue" onclick="RT.loadCode()">読み込む</button><button class="btn red" onclick="RT.reset()">最初から</button><button class="btn ghost" onclick="RT.go('home')">戻る</button>`;
 }else if(view==='event'){
  html+=`<div class="miniRow"><b>競技中</b><span>${events[selected].name}</span></div><div style="height:8px"></div><button class="btn red" onclick="RT.abort()">棄権してホームへ</button>`;
 }
 $('leftContent').innerHTML=html;
}
function renderRight(){
 const names={reaction:'スタート反応',accel:'加速力',maxspeed:'最高速度',stamina:'スタミナ',jump:'ジャンプ力',hurdle:'ハードル技術',takeoff:'踏切精度',strength:'筋力',technique:'投てき技術'};
 let html=`<div class="miniRow"><b>${escapeHtml(state.athlete.name)}</b><span>${rank()}</span></div><div style="height:10px"></div>`;
 for(const [k,n] of Object.entries(names)){html+=`<div class="stat"><div class="lab"><span>${n}</span><b>${state.stats[k]}</b></div><div class="bar"><i style="width:${state.stats[k]}%"></i></div></div>`}
 html+=`<h3>最近の結果</h3><div class="miniList">${state.history.slice(-8).reverse().map(h=>`<div class="miniRow"><b>${h.event}</b><span>${h.result} / ${h.place}位</span></div>`).join('')||'<div class="miniRow"><b>まだ記録なし</b><span>大会に出よう</span></div>'}</div>`;
 $('rightContent').innerHTML=html;
}
function renderControls(){
 const rb=$('runBtn'),ab=$('actionBtn');rb.classList.add('hidden');ab.classList.add('hidden');
 if(game&&game.active){
  if(game.controls.run){rb.classList.remove('hidden');rb.textContent=game.controls.run}
  if(game.controls.action){ab.classList.remove('hidden');ab.textContent=game.controls.action}
  if(game.controls.danger)ab.classList.add('danger');else ab.classList.remove('danger');
 }
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function escapeAttr(s){return escapeHtml(s).replace(/`/g,'&#096;')}
function upgradeCost(k){return Math.round(25+state.stats[k]*1.7)}
function formatPB(id,pb){if(!pb)return '---';const e=events[id];if(['sprint','hurdles','relay'].includes(e.type))return pb.toFixed(2)+'s';if(e.type==='highjump')return pb.toFixed(2)+'m';return pb.toFixed(2)+'m'}
function missionRows(){const ms=[['sub12','100m 12秒台',!!state.missions.sub12],['hNo','110mH ノーミス',!!state.missions.hNo],['lj5','走幅跳 5m超え',!!state.missions.lj5],['noFS3','フライングなし3勝',state.missions.noFS3>=3],['national','全国大会優勝',!!state.missions.national]];return ms.map(m=>`<div class="miniRow"><b>${m[1]}</b><span class="${m[2]?'good':''}">${m[2]?'達成':'未達成'}</span></div>`).join('')}
function showToast(t,kind=''){const el=$('toast');el.textContent=t;el.className='toast show '+kind;clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.className='toast',900);}
function center(big,sub=''){$('centerMsg').innerHTML=`<div class="huge">${big}</div><div class="sub">${sub}</div>`;}
function flash(a=.35){const f=$('flash');f.style.background=`rgba(255,255,255,${a})`;setTimeout(()=>f.style.background='rgba(255,255,255,0)',80)}
function showModal(title,body,button='閉じる',cb=null){$('modalBox').innerHTML=`<h2>${title}</h2><div>${body}</div><div style="height:14px"></div><button class="btn primary" id="modalClose">${button}</button>`;$('modal').classList.add('show');$('modalClose').onclick=()=>{$('modal').classList.remove('show');if(cb)cb()}}
function hideModal(){$('modal').classList.remove('show')}
function calcJudge(x,perfect=0){const d=Math.abs(x-perfect);if(d<.035)return['PERFECT',1.2];if(d<.075)return['GREAT',1.0];if(d<.13)return['GOOD',.72];if(d<.2)return['LATE',.35];return['MISS',-.25]}
function addHistory(event,result,place){state.history.push({event,result,place,date:Date.now()});if(state.history.length>40)state.history.shift();}
function setPB(id,val){const e=events[id],old=state.pbs[id];let better=false;if(!old)better=true;else if(['sprint','hurdles','relay'].includes(e.type))better=val<old;else better=val>old;if(better){state.pbs[id]=val;showToast('自己ベスト更新！','good');return true}return false}
function opponentResults(id){const e=events[id],m=meets[state.meet].level;const arr=[];const names=['佐伯 隼','三浦 蓮','高橋 翔','中村 樹','木村 陽','山本 陸','伊藤 颯'];
 for(let i=0;i<7;i++){let res;if(['sprint','hurdles','relay'].includes(e.type)){const base={ '100m':12.9,'200m':26.0,'400m':59.5,'110H':18.2,'4x100R':51.5}[id]||13;res=base-m*1.05-i*.04+(Math.random()-.5)*1.1;}else if(id==='LJ')res=4.5+m*.55+i*.03+(Math.random()-.5)*.65;else if(id==='HJ')res=1.35+m*.12+i*.01+(Math.random()-.5)*.16;else if(id==='TJ')res=9.3+m*.75+i*.04+(Math.random()-.5)*.8;else if(id==='SP')res=8.2+m*1.2+i*.05+(Math.random()-.5)*1.0;else res=32+m*4.5+i*.2+(Math.random()-.5)*4.0;arr.push({name:names[i],result:Math.max(.1,res),player:false})}return arr}
function resultModal(id,playerResult,extra={}){const e=events[id],track=['sprint','hurdles','relay'].includes(e.type);let arr=opponentResults(id);arr.push({name:state.athlete.name,result:playerResult,player:true,dq:extra.dq});arr=arr.filter(x=>!x.dq);arr.sort((a,b)=>track?a.result-b.result:b.result-a.result);let place=extra.dq?8:arr.findIndex(x=>x.player)+1;const qual=place>0&&place<=meets[state.meet].qual;let reward=extra.dq?8:Math.max(18,Math.round(meets[state.meet].bonus*(9-place)/8));state.tp+=reward;if(!extra.dq&&playerResult>0)setPB(id,playerResult);if(id==='100m'&&playerResult<13)state.missions.sub12=true;if(id==='110H'&&extra.noMiss)state.missions.hNo=true;if(id==='LJ'&&playerResult>=5)state.missions.lj5=true;if(qual&&!extra.falseStart)state.missions.noFS3=(state.missions.noFS3||0)+1;if(qual&&state.meet===2&&place===1)state.missions.national=true;
 if(qual){state.careerWins++;if(state.meet<2&&place<=meets[state.meet].qual){state.meet++;}}
 addHistory(e.name,extra.dq?'DQ':formatPB(id,playerResult),extra.dq?'DQ':place);save();
 let table=`<table class="resultsTable"><tr><th>順位</th><th>選手</th><th>記録</th></tr>`;arr.forEach((r,i)=>{table+=`<tr ${r.player?'style="background:rgba(255,211,90,.13)"':''}><td>${i+1}</td><td>${escapeHtml(r.name)}</td><td>${formatPB(id,r.result)}</td></tr>`});if(extra.dq)table+=`<tr style="background:rgba(255,75,75,.16)"><td>DQ</td><td>${escapeHtml(state.athlete.name)}</td><td>失格</td></tr>`;table+='</table>';
 const body=`<p>${extra.summary||''}</p><p>獲得TP: <b class="goldText">${reward}</b> / ${qual?'<span class="good">次の大会へ進出条件クリア</span>':'<span class="bad">進出条件未達</span>'}</p>${table}<div style="height:14px"></div><div class="miniRow"><b>次の大会</b><span>${meets[state.meet].name}</span></div>`;
 showModal(extra.dq?'失格 / DQ':'リザルト',body,'表彰・ホームへ',()=>{view='home';game=null;renderAll();center('REAL TRACK','次は練習で能力を上げよう');});
}
function createStartSequence(g){g.phase='marks';g.phaseTime=0;g.gunTime=0;g.started=false;g.falseStart=false;g.reaction=null;center('ON YOUR MARKS','RUNを押さずに待つ');setTimeout(()=>{if(game!==g)return;g.phase='set';g.phaseTime=0;center('SET','ピストル音まで待つ');const wait=700+Math.random()*1200;setTimeout(()=>{if(game!==g||g.falseStart)return;g.phase='go';g.gunTime=performance.now();center('GO!','RUN TAPでリズムよく加速');flash(.45);beep(880,.08);},wait)},950)}
function startGame(id){selected=id;view='event';hideModal();const e=events[id];const base={id,e,active:true,controls:{run:null,action:null},time:0,wind:(Math.random()*4-2).toFixed(1)*1,judge:'---',lastTap:0,needle:0,phase:'ready'};if(['sprint','hurdles','relay'].includes(e.type))setupRace(base);else if(e.type==='longjump')setupLongJump(base,false);else if(e.type==='triplejump')setupLongJump(base,true);else if(e.type==='highjump')setupHighJump(base);else if(e.type==='throw')setupThrow(base);game=base;renderAll();}
function setupRace(g){Object.assign(g,{distance:g.e.distance,pos:0,speed:0,stamina:100,form:100,finish:false,lanes:makeRunners(g.id),hurdleIndex:0,hits:0,noMiss:true,exchangeIndex:0,exchanges:[100,200,300],lastStride:0,controls:{run:'RUN TAP',action:g.e.type==='hurdles'?'JUMP':g.e.type==='relay'?'BATON':null}});createStartSequence(g)}
function makeRunners(id){let a=[];for(let i=0;i<8;i++){a.push({lane:i+1,pos:0,speed:0,name:i===3?state.athlete.name:'AI',kit:i===3?state.athlete.kit:(i%kits.length),player:i===3})}return a}
function setupLongJump(g,triple){Object.assign(g,{triple,runway:42,pos:0,speed:0,stamina:100,power:0,takeoffDone:false,foul:false,jumpDistance:0,phase:'approach',step:0,stepNeed:[.30,.54,.76],controls:{run:'RUN UP',action:triple?'HOP':'TAKE OFF'}});center(triple?'TRIPLE JUMP':'LONG JUMP','助走で加速、踏切板ギリギリでACTION');}
function setupHighJump(g){Object.assign(g,{bar:Math.max(1.20,Math.min(2.00,(state.pbs.HJ||1.25)+.05)),pos:0,speed:0,stamina:100,phase:'approach',takeoff:false,cleared:false,controls:{run:'APPROACH',action:'TAKE OFF'}});center('HIGH JUMP',`バー ${g.bar.toFixed(2)}m / カーブ助走から踏切`);}
function setupThrow(g){Object.assign(g,{power:0,angle:20,angleDir:1,phase:'charge',released:false,throwDistance:0,controls:{run:'POWER',action:'RELEASE'}});center(g.id==='SP'?'SHOT PUT':'JAVELIN','RUNでパワー、ACTIONで最適角度リリース');}
function onRun(){if(!game||!game.active)return;const now=performance.now();if(['sprint','hurdles','relay'].includes(game.e.type)){if(game.phase==='marks'||game.phase==='set'){game.falseStart=true;game.active=false;center('FALSE START','ピストル前に動いたため失格');beep(150,.2);resultModal(game.id,999,{dq:true,falseStart:true,summary:'スタート前に動いたため失格です。'});return}if(game.phase!=='go')return; if(game.reaction===null){game.reaction=(now-game.gunTime)/1000;if(game.reaction<.100){game.active=false;center('FALSE START',`Reaction ${game.reaction.toFixed(3)}s`);resultModal(game.id,999,{dq:true,falseStart:true,summary:`反応時間 ${game.reaction.toFixed(3)}s。0.100秒未満なので失格判定。`});return}}
 const gap=(now-game.lastTap)/1000;game.lastTap=now;const ideal=game.id==='400m'?0.245:game.id==='200m'?0.205:.178;const d=Math.abs(gap-ideal);let j='GOOD',mul=.65;if(gap<.07){j='MISS';mul=-.22;game.stamina-=5;game.form-=7}else if(d<.025){j='PERFECT';mul=1.22}else if(d<.055){j='GREAT';mul=.96}else if(d<.1){j='GOOD';mul=.65}else{j='LATE';mul=.22}game.judge=j;showToast(j,j==='MISS'?'bad':'');$('judgeText').textContent=j;const s=state.stats;const accel=(0.55+s.accel*.013)*mul*(game.stamina/100);game.speed+=accel;game.stamina-=game.id==='400m'?1.55:game.id==='200m'?1.1:.86;if(game.stamina<20)game.form-=2;beep(j==='PERFECT'?660:j==='GREAT'?520:j==='MISS'?120:360,.035);
 }else if(game.e.type==='longjump'||game.e.type==='triplejump'||game.e.type==='highjump'){game.speed+=.45+state.stats.accel*.009;game.stamina-=.65;game.judge='DRIVE';$('judgeText').textContent='DRIVE'}else if(game.e.type==='throw'){game.power=Math.min(100,game.power+4+state.stats.strength*.04);game.judge='POWER';$('judgeText').textContent='POWER';}
}
function onAction(){if(!game||!game.active)return;const now=performance.now();if(game.e.type==='hurdles'){if(game.phase!=='go')return;const hp=hurdlePositions()[game.hurdleIndex];if(!hp)return;const diff=hp-game.pos;let j,m;if(diff>3.1){j='TOO EARLY';m=.35;game.hits++;game.noMiss=false}else if(diff>1.45){j='PERFECT';m=1.06}else if(diff>.55){j='GREAT';m=.88}else if(diff>-0.35){j='HIT';m=.52;game.hits++;game.noMiss=false}else{j='MISS';m=.28;game.hits++;game.noMiss=false}game.speed*=m;game.speed+=state.stats.hurdle*.025;game.hurdleIndex++;game.judge=j;showToast(j,j==='HIT'||j==='MISS'?'bad':'');$('judgeText').textContent=j;beep(j==='PERFECT'?740:j==='GREAT'?520:160,.06);
 }else if(game.e.type==='relay'){if(game.phase!=='go')return;const ex=game.exchanges[game.exchangeIndex];const diff=Math.abs(game.pos-ex);let j;if(diff<6){j='SMOOTH BATON';game.speed+=1.0;game.form+=4}else if(diff<12){j='SAFE BATON';game.speed*=.92}else{j='BAD EXCHANGE';game.speed*=.72;game.form-=15}game.exchangeIndex++;game.judge=j;showToast(j,j==='BAD EXCHANGE'?'bad':'good');$('judgeText').textContent=j;}
 else if(game.e.type==='longjump'){if(game.triple){tripleAction(game)}else{longTakeoff(game)}}
 else if(game.e.type==='triplejump'){tripleAction(game)}
 else if(game.e.type==='highjump'){highTakeoff(game)}
 else if(game.e.type==='throw'){releaseThrow(game)}
}
function longTakeoff(g){if(g.takeoffDone)return;const board=40;const foul=g.pos>board+.20;const diff=board-g.pos;let acc=Math.max(0,1-Math.abs(diff)/2.2);let j=foul?'FOUL':acc>.92?'PERFECT':acc>.72?'GREAT':acc>.45?'GOOD':'POOR';g.takeoffDone=true;g.foul=foul;g.judge=j;$('judgeText').textContent=j;showToast(j,foul?'bad':'');const s=state.stats;let base=2.2+g.speed*.42+s.jump*.025+s.takeoff*.026+g.wind*.05;g.jumpDistance=foul?0:Math.max(2.0,base*(.72+acc*.34));g.phase='flight';g.controls={run:null,action:'LAND'};setTimeout(()=>finishFieldJump(g),900)}
function tripleAction(g){const board=40;if(g.phase==='flight')return;const target=board+g.step*5.2;const diff=target-g.pos;const acc=Math.max(0,1-Math.abs(diff)/2.6);let j=acc>.9?'PERFECT':acc>.7?'GREAT':acc>.43?'GOOD':'MISS';if(g.step===0&&g.pos>board+.20){g.foul=true;j='FOUL'}g.power+=Math.max(0,g.speed*(.5+acc*.45)+state.stats.takeoff*.035);g.speed*=.82+acc*.08;g.step++;g.judge=j;$('judgeText').textContent=j;showToast(j,g.foul||j==='MISS'?'bad':'');g.controls.action=g.step===1?'STEP':g.step===2?'JUMP':'LAND';if(g.step>=3){g.phase='flight';g.jumpDistance=g.foul?0:Math.max(5.5,3.2+g.power*.34+state.stats.jump*.035+g.wind*.05);setTimeout(()=>finishFieldJump(g),900)}}
function finishFieldJump(g){g.active=false;const result=g.foul?0:g.jumpDistance;center(g.foul?'FOUL':`${result.toFixed(2)}m`,g.triple?'三段跳 結果':'跳躍 結果');resultModal(g.id,result,{summary:g.foul?'踏切線を越えたためファウル。':`風 ${g.wind>=0?'+':''}${g.wind.toFixed(1)}m/s / 記録 ${result.toFixed(2)}m`});renderControls();}
function highTakeoff(g){if(g.takeoff)return;const take=31;const diff=Math.abs(take-g.pos);const timing=Math.max(0,1-diff/2.8);const s=state.stats;const clearance=1.05+g.speed*.07+s.jump*.008+s.takeoff*.004+timing*.18;g.takeoff=true;g.cleared=clearance>=g.bar;g.judge=g.cleared?'CLEAR':'KNOCK';$('judgeText').textContent=g.judge;showToast(g.judge,g.cleared?'good':'bad');setTimeout(()=>{g.active=false;center(g.cleared?'CLEAR!':'KNOCKED BAR',`バー ${g.bar.toFixed(2)}m`);resultModal(g.id,g.cleared?g.bar:Math.max(1.10,g.bar-.05),{summary:g.cleared?'バーをクリア。':'バーに接触しました。'});},900)}
function releaseThrow(g){if(g.released)return;const optimal=g.id==='SP'?40:34;const diff=Math.abs(g.angle-optimal);const timing=Math.max(0,1-diff/28);const s=state.stats;let dist;if(g.id==='SP')dist=4.5+g.power*.055+s.strength*.052+s.technique*.028+timing*1.7;else dist=18+g.power*.25+s.strength*.13+s.technique*.16+timing*8+g.wind*.35;g.throwDistance=Math.max(1,dist);g.released=true;g.active=false;g.judge=timing>.86?'PERFECT':timing>.65?'GREAT':timing>.4?'GOOD':'POOR';$('judgeText').textContent=g.judge;center(`${g.throwDistance.toFixed(2)}m`,`角度 ${g.angle.toFixed(0)}° / ${g.judge}`);resultModal(g.id,g.throwDistance,{summary:`リリース角 ${g.angle.toFixed(0)}° / パワー ${Math.round(g.power)}%`});}
function hurdlePositions(){let p=[13.72];for(let i=1;i<10;i++)p.push(13.72+9.14*i);return p}
function update(dt){if(!game||!game.active)return;game.time+=dt;if(['sprint','hurdles','relay'].includes(game.e.type)){if(game.phase==='go'){const s=state.stats;const max=(7.0+s.maxspeed*.055)*(game.id==='400m'?.92:1)*(game.stamina<25?.88:1);game.speed=Math.max(0,Math.min(max,game.speed-(0.32+(100-game.form)*.003)*dt));game.pos+=game.speed*dt;game.stamina=Math.max(0,game.stamina-.7*dt);if(game.e.type==='hurdles'){const hp=hurdlePositions()[game.hurdleIndex];if(hp&&game.pos>hp+.9){game.hits++;game.noMiss=false;game.speed*=.75;game.hurdleIndex++;showToast('HURDLE HIT','bad')}}if(game.e.type==='relay'){const ex=game.exchanges[game.exchangeIndex];if(ex&&game.pos>ex+20){game.speed*=.68;game.exchangeIndex++;showToast('EXCHANGE LOST','bad')}}if(game.pos>=game.distance){game.active=false;const time=(performance.now()-game.gunTime)/1000;center('FINISH',`${time.toFixed(2)}s / Reaction ${game.reaction?.toFixed(3)||'---'}s`);photoFinish();resultModal(game.id,time,{noMiss:game.noMiss,summary:`Reaction ${game.reaction?.toFixed(3)||'---'}s / 接触 ${game.hits||0}回`});}}
 }else if(game.e.type==='longjump'||game.e.type==='triplejump'){if(game.phase==='approach'){game.speed=Math.max(0,Math.min(10.5,game.speed-.18*dt));game.pos+=game.speed*dt;if(game.pos>45&&!game.takeoffDone&&game.step===0){game.foul=true;finishFieldJump(game)}}}
 else if(game.e.type==='highjump'){if(game.phase==='approach'){game.speed=Math.max(0,Math.min(8.2,game.speed-.15*dt));game.pos+=game.speed*dt;if(game.pos>34&&!game.takeoff)highTakeoff(game)}}
 else if(game.e.type==='throw'){game.angle+=game.angleDir*52*dt;if(game.angle>58){game.angle=58;game.angleDir=-1}if(game.angle<16){game.angle=16;game.angleDir=1}game.power=Math.max(0,game.power-.4*dt)}
}
function photoFinish(){const p=$('photoLine');p.style.left='88%';p.style.opacity='1';setTimeout(()=>p.style.opacity='0',1200)}
function draw(){const w=canvas.clientWidth,h=canvas.clientHeight;ctx.clearRect(0,0,w,h);drawStadium(w,h);if(game){const t=game.e.type;if(['sprint','hurdles','relay'].includes(t))drawRace(w,h);else if(t==='longjump'||t==='triplejump')drawJump(w,h);else if(t==='highjump')drawHigh(w,h);else if(t==='throw')drawThrow(w,h);}else drawIdle(w,h);updateHud();requestAnimationFrame(loop)}
function loop(now){const dt=Math.min(.05,(now-last)/1000);last=now;update(dt);draw();}
function drawStadium(w,h){let sky=ctx.createLinearGradient(0,0,0,h);sky.addColorStop(0,'#143f48');sky.addColorStop(.48,'#0b171d');sky.addColorStop(1,'#071015');ctx.fillStyle=sky;ctx.fillRect(0,0,w,h);ctx.fillStyle='rgba(255,255,255,.08)';for(let i=0;i<22;i++){const x=i*w/21;ctx.fillRect(x-1,32,2,180);ctx.beginPath();ctx.arc(x,28,4,0,Math.PI*2);ctx.fill()}ctx.fillStyle='rgba(255,255,255,.12)';for(let r=0;r<5;r++){ctx.fillRect(0,88+r*18,w,8)}for(let i=0;i<260;i++){ctx.fillStyle=`hsla(${180+Math.random()*60},40%,${45+Math.random()*35}%,.22)`;ctx.fillRect(Math.random()*w,92+Math.random()*85,2,2)}ctx.fillStyle='rgba(0,0,0,.22)';ctx.fillRect(0,h*.72,w,h*.28)}
function drawTrackBase(w,h,lanes=8){const top=h*.38,lh=Math.min(34,(h*.48)/lanes);ctx.fillStyle='#8d2c25';roundRect(24,top,w-48,lh*lanes+22,18,true);ctx.strokeStyle='rgba(255,255,255,.55)';ctx.lineWidth=1;for(let i=0;i<=lanes;i++){const y=top+12+i*lh;ctx.beginPath();ctx.moveTo(34,y);ctx.lineTo(w-34,y);ctx.stroke()}return{top,lh,left:42,right:w-52,width:w-94}}
function drawRace(w,h){const g=game,b=drawTrackBase(w,h,8);const prog=Math.min(1,g.pos/g.distance);for(let i=0;i<8;i++){const y=b.top+12+i*b.lh+b.lh/2;let x=b.left+b.width*(i===3?prog:Math.min(.99,prog*(.92+Math.random()*.03)+(i-3)*.002));drawRunner(x,y,i===3?state.athlete.kit:i%kits.length,i===3);if(i===3){ctx.fillStyle='#fff';ctx.font='900 11px system-ui';ctx.fillText(state.athlete.name,x-20,y-18)}}ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(b.right,b.top+8);ctx.lineTo(b.right,b.top+b.lh*8+15);ctx.stroke();ctx.fillStyle='rgba(255,255,255,.9)';ctx.font='900 11px system-ui';ctx.fillText('FINISH',b.right-46,b.top+2);if(g.e.type==='hurdles'){ctx.strokeStyle='#e8faff';hurdlePositions().forEach(p=>{const x=b.left+b.width*(p/g.distance);for(let l=0;l<8;l++){const y=b.top+12+l*b.lh+b.lh/2;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(x-7,y-9);ctx.lineTo(x+7,y-9);ctx.stroke();}})}if(g.e.type==='relay'){ctx.fillStyle='rgba(255,211,90,.23)';g.exchanges.forEach(p=>{const x=b.left+b.width*(p/g.distance);ctx.fillRect(x-12,b.top+10,24,b.lh*8)})}}
function drawRunner(x,y,kit,player){const k=kits[kit]||kits[0];ctx.save();ctx.translate(x,y);const phase=game?Math.sin(game.time*18+(player?0:kit)) :0;ctx.strokeStyle=k[0];ctx.lineWidth=player?4:3;ctx.lineCap='round';ctx.fillStyle=k[0];ctx.beginPath();ctx.arc(0,-16,5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.moveTo(0,-10);ctx.lineTo(0,3);ctx.moveTo(0,-4);ctx.lineTo(-9,3+phase*3);ctx.moveTo(0,-4);ctx.lineTo(10,2-phase*3);ctx.moveTo(0,3);ctx.lineTo(-9,14-phase*5);ctx.moveTo(0,3);ctx.lineTo(10,14+phase*5);ctx.stroke();ctx.restore()}
function drawJump(w,h){const g=game;const ground=h*.70;ctx.fillStyle='#a64825';ctx.fillRect(0,ground,w,h-ground);ctx.fillStyle='#b88a55';ctx.fillRect(w*.62,ground-18,w*.30,44);ctx.fillStyle='#f6f2d0';ctx.fillRect(w*.60,ground-24,8,52);ctx.fillStyle=g.pos>40?'rgba(255,75,75,.4)':'rgba(255,255,255,.65)';ctx.fillRect(w*.60+8,ground-24,4,52);ctx.strokeStyle='rgba(255,255,255,.25)';for(let i=0;i<10;i++){let x=w*.62+i*w*.03;ctx.beginPath();ctx.moveTo(x,ground-18);ctx.lineTo(x,ground+26);ctx.stroke()}const x=Math.min(w*.60,(w*.08+(g.pos/42)*w*.52));drawRunner(x,ground-8,state.athlete.kit,true);ctx.fillStyle='#fff';ctx.font='900 13px system-ui';ctx.fillText(`踏切板まで ${(40-g.pos).toFixed(2)}m`,w*.08,ground-52);ctx.fillText(`風 ${g.wind>=0?'+':''}${g.wind.toFixed(1)}m/s`,w*.08,ground-32);if(g.triple){ctx.fillText(`PHASE ${['HOP','STEP','JUMP','LAND'][g.step]||'LAND'}`,w*.08,ground-72)}}
function drawHigh(w,h){const g=game,ground=h*.70;ctx.fillStyle='#8d2c25';ctx.fillRect(0,ground,w,h-ground);ctx.fillStyle='#34643f';ctx.fillRect(w*.57,ground-16,w*.28,50);const barY=ground-40-g.bar*58;ctx.strokeStyle='#fff';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(w*.62,barY);ctx.lineTo(w*.80,barY);ctx.stroke();ctx.strokeStyle='rgba(255,255,255,.55)';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(w*.62,ground-8);ctx.lineTo(w*.62,barY-8);ctx.moveTo(w*.80,ground-8);ctx.lineTo(w*.80,barY-8);ctx.stroke();const x=w*.12+(g.pos/34)*w*.52;drawRunner(x,ground-10,state.athlete.kit,true);ctx.fillStyle='#fff';ctx.font='900 13px system-ui';ctx.fillText(`バー ${g.bar.toFixed(2)}m`,w*.62,barY-12);}
function drawThrow(w,h){const g=game,ground=h*.72;ctx.fillStyle='#315a36';ctx.fillRect(0,ground,w,h-ground);ctx.fillStyle='#aaa';ctx.beginPath();ctx.arc(w*.22,ground-8,50,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.08)';ctx.beginPath();ctx.moveTo(w*.22,ground-8);ctx.lineTo(w*.90,ground-180);ctx.lineTo(w*.96,ground+40);ctx.closePath();ctx.fill();drawRunner(w*.22,ground-18,state.athlete.kit,true);ctx.save();ctx.translate(w*.22,ground-34);ctx.rotate(-g.angle*Math.PI/180);ctx.strokeStyle=g.id==='SP'?'#ddd':'#ffd35a';ctx.lineWidth=g.id==='SP'?8:4;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(36,0);ctx.stroke();ctx.restore();ctx.fillStyle='#fff';ctx.font='900 14px system-ui';ctx.fillText(`POWER ${Math.round(g.power)}%`,w*.08,ground-110);ctx.fillText(`ANGLE ${g.angle.toFixed(0)}°`,w*.08,ground-88);}
function drawIdle(w,h){const b=drawTrackBase(w,h,8);ctx.fillStyle='rgba(255,255,255,.9)';ctx.font='1000 28px system-ui';ctx.fillText('CAREER MODE',b.left,b.top-30);ctx.font='900 14px system-ui';ctx.fillStyle='rgba(255,255,255,.65)';ctx.fillText('実際の陸上競技に近い反応・距離・判定で戦う',b.left,b.top-8);for(let i=0;i<8;i++)drawRunner(b.left+40+i*45,b.top+12+i*b.lh+b.lh/2,i%kits.length,i===3)}
function roundRect(x,y,w,h,r,fill){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);if(fill)ctx.fill();else ctx.stroke()}
function updateHud(){if(!game){$('eventLabel').textContent='HOME';$('mainReadout').textContent='READY';$('distReadout').textContent='0.00';$('windReadout').textContent='Wind +0.0';$('speedBar').style.width='0%';$('staminaBar').style.width='100%';$('inputText').textContent='待機';$('needle').style.left='50%';return}const g=game;$('eventLabel').textContent=events[g.id].name;if(['sprint','hurdles','relay'].includes(g.e.type)){$('mainReadout').textContent=g.phase==='go'?`${g.pos.toFixed(1)}m / ${g.distance}m`:g.phase.toUpperCase();$('distReadout').textContent=g.speed.toFixed(1)+'m/s';$('windReadout').textContent=`RT ${g.reaction?g.reaction.toFixed(3):'---'}`;$('speedBar').style.width=Math.min(100,g.speed/12*100)+'%';$('staminaBar').style.width=Math.max(0,g.stamina)+'%';$('inputText').textContent=g.phase==='go'?'走行中':'待機';}
 else if(g.e.type==='longjump'||g.e.type==='triplejump'||g.e.type==='highjump'){$('mainReadout').textContent=`${g.pos.toFixed(1)}m`; $('distReadout').textContent=g.speed.toFixed(1)+'m/s';$('windReadout').textContent=`Wind ${g.wind>=0?'+':''}${g.wind.toFixed(1)}`;$('speedBar').style.width=Math.min(100,g.speed/10*100)+'%';$('staminaBar').style.width=Math.max(0,g.stamina)+'%';$('inputText').textContent='助走';}
 else{$('mainReadout').textContent=`POWER ${Math.round(g.power)}%`; $('distReadout').textContent=g.angle.toFixed(0)+'°';$('windReadout').textContent=`Wind ${g.wind>=0?'+':''}${g.wind.toFixed(1)}`;$('speedBar').style.width=g.power+'%';$('staminaBar').style.width=Math.max(0,100-Math.abs(g.angle-(g.id==='SP'?40:34))*2)+'%';$('inputText').textContent='投てき';}
 const n=(Math.sin((performance.now()/1000)*4)+1)/2;$('needle').style.left=(n*100)+'%';}
function beep(freq=440,dur=.06){try{const ac=beep.ac||(beep.ac=new (window.AudioContext||window.webkitAudioContext)());const o=ac.createOscillator(),g=ac.createGain();o.frequency.value=freq;o.type='triangle';g.gain.value=.035;o.connect(g);g.connect(ac.destination);o.start();g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+dur);o.stop(ac.currentTime+dur)}catch(e){}}
window.RT={go(v){view=v;renderAll();},setKit(i){state.athlete.kit=i;renderAll();},setName(){const v=$('nameInput').value.trim();state.athlete.name=v||'ATHLETE';state.created=true;save();view='home';renderAll();},up(k){const c=upgradeCost(k);if(state.tp>=c&&state.stats[k]<99){state.tp-=c;state.stats[k]++;save()}},select(id){selected=id;renderAll();},startSelected(){startGame(selected)},abort(){game=null;view='home';renderAll();center('REAL TRACK','棄権しました');},copySave(){navigator.clipboard?.writeText(exportCode());showToast('コピーしました','good')},loadCode(){importCode($('loadCode').value)},reset(){if(confirm('本当に最初からにしますか？')){state=defaultState();save();view='home';renderAll();}},setBar(delta){if(game&&game.e.type==='highjump'){game.bar=Math.max(1.0,Math.min(2.4,game.bar+delta));center('HIGH JUMP',`バー ${game.bar.toFixed(2)}m`)}}};
$('runBtn').addEventListener('pointerdown',onRun);$('actionBtn').addEventListener('pointerdown',onAction);$('saveBtn').onclick=save;$('toggleLeft').onclick=()=>$('leftPanel').classList.toggle('open');$('toggleRight').onclick=()=>$('rightPanel').classList.toggle('open');
window.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();onRun()}if(e.code==='KeyJ'){onAction()}if(e.code==='Escape'){if(game)RT.abort()}});
load();renderAll();requestAnimationFrame(t=>{last=t;loop(t)});
})();
